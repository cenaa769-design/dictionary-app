<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; text-align: center; }
        input[type="text"] { width: 80%; padding: 12px; font-size: 16px; margin-bottom: 20px; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
        #upload-section { background: #f8f9fa; padding: 20px; border: 2px dashed #ccc; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>Massive Dictionary App</h1>
    <p id="status">Status: Checking local storage...</p>
    
    <div id="upload-section">
        <p><strong>First time setup:</strong> Select your 111MB dictionary.json file from your computer (it will be saved locally so you only do this once):</p>
        <input type="file" id="fileInput" accept=".json">
    </div>

    <input type="text" id="searchBox" placeholder="Type a word..." disabled>
    <div id="result"></div>

    <script>
        let dictionaryData = {};

        function initApp() {
            const cached = localStorage.getItem("dictionary_cache");
            if (cached) {
                try {
                    dictionaryData = JSON.parse(cached);
                    document.getElementById("status").innerText = "Status: Dictionary loaded instantly from cache!";
                    document.getElementById("upload-section").style.display = "none";
                    document.getElementById("searchBox").disabled = false;
                } catch (e) {
                    localStorage.removeItem("dictionary_cache");
                }
            } else {
                document.getElementById("status").innerText = "Status: Please select your dictionary.json file below.";
            }
        }

        document.getElementById("fileInput").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById("status").innerText = "Status: Reading and caching 111MB file (this may take a few seconds)...";
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    dictionaryData = JSON.parse(event.target.result);
                    localStorage.setItem("dictionary_cache", event.target.result);
                    
                    document.getElementById("status").innerText = "Status: Dictionary ready and cached permanently!";
                    document.getElementById("upload-section").style.display = "none";
                    document.getElementById("searchBox").disabled = false;
                } catch (err) {
                    document.getElementById("status").innerText = "Status: Error parsing JSON file.";
                }
            };
            reader.readAsText(file);
        });

        document.getElementById("searchBox").addEventListener("input", (e) => {
            const query = e.target.value.toLowerCase().trim();
            const resultDiv = document.getElementById("result");
            
            if (!query) {
                resultDiv.innerText = "";
                return;
            }

            if (dictionaryData[query]) {
                resultDiv.innerText = `Definition: ${dictionaryData[query]}`;
            } else {
                resultDiv.innerText = "Word not found.";
            }
        });

        initApp();
    </script>
</body>
</html>
