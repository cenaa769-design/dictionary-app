<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; text-align: center; }
        input { width: 80%; padding: 12px; font-size: 16px; margin-bottom: 20px; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h1>Massive Dictionary App</h1>
    <p id="status">Status: Loading dictionary...</p>
    
    <input type="text" id="searchBox" placeholder="Type a word..." disabled>
    <div id="result"></div>

    <script>
        let dictionaryData = {};

        const DICTIONARY_URL = "https://github.com/cenaa769-design/dictionary-app/releases/download/1.1/dictionary.json";

        async function loadDictionary() {
            try {
                const cached = localStorage.getItem("dictionary_cache");
                if (cached) {
                    dictionaryData = JSON.parse(cached);
                    document.getElementById("status").innerText = "Status: Dictionary loaded instantly from cache!";
                    document.getElementById("searchBox").disabled = false;
                    return;
                }

                const response = await fetch(DICTIONARY_URL);
                dictionaryData = await response.json();
                
                localStorage.setItem("dictionary_cache", JSON.stringify(dictionaryData));
                
                document.getElementById("status").innerText = "Status: Dictionary ready!";
                document.getElementById("searchBox").disabled = false;
            } catch (error) {
                document.getElementById("status").innerText = "Status: Failed to load dictionary link.";
            }
        }

        document.getElementById("searchBox").addEventListener("input", (e) => {
            const query = e.target.value.toLowerCase().trim();
            const resultDiv = document.getElementById("result");
            
            if (!query) {
                resultDiv.innerText = "";
                return;
            }

            if (dictionaryData[query]) {
                resultDiv.innerText = `Definition: ${dictionaryData[query]}`;
            } else {
                resultDiv.innerText = "Word not found.";
            }
        });

        loadDictionary();
    </script>
</body>
</html>
